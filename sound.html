<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sonic diary — olekuz11</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>olekuz11 / logbook</h1>
    <div class="site-title">sonic diary</div>
    <div class="site-sub">field recordings — daily sounds — things worth preserving</div>
    <nav>
      <a href="index.html">log</a>
      <a href="sound.html" class="active">sonic diary</a>
      <a href="https://github.com/olekuz11" target="_blank">github ↗</a>
    </nav>
  </header>

  <main id="log"></main>

  <div class="empty-state" id="empty" style="display:none;">
    — no sonic entries yet —
  </div>

  <footer>
    code as if nobody's watching. — <a href="https://github.com/olekuz11" target="_blank">olekuz11</a>
  </footer>

  <script>
    fetch('index.html')
      .then(r => r.text())
      .then(html => {
        const parser = new DOMParser();
        const doc    = parser.parseFromString(html, 'text/html');
        const sonic  = doc.querySelectorAll('.entry[data-tag="sonic"]');
        const log    = document.getElementById('log');
        const empty  = document.getElementById('empty');

        if (sonic.length === 0) {
          empty.style.display = 'block';
          return;
        }

        sonic.forEach(entry => log.appendChild(document.importNode(entry, true)));
      })
      .catch(() => {
        const empty = document.getElementById('empty');
        empty.style.display = 'block';
        empty.textContent = '— open via github pages or local server to load entries —';
      });
  </script>

</body>
</html>
